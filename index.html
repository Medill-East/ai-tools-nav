        * {

        }
        
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .category-btn {
            transition: all 0.2s ease;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }
        
        .compare-checkbox:checked + div {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }
        
        .comparison-table th {
            background: rgba(99, 102, 241, 0.2);
            position: sticky;
            top: 0;
        }
        
        .comparison-table td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .pros-cons .pros {
            border-left: 3px solid #10b981;
        }
        
        .pros-cons .cons {
            border-left: 3px solid #ef4444;
        }
        
        .tag {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }
        
        .new-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .rating-stars {
            color: #fbbf24;
        }
        
        .price-free { color: #10b981; }
        .price-freemium { color: #f59e0b; }
        .price-paid { color: #ef4444; }
        
        .view-toggle {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .view-toggle.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .diff-highlight {
            background: rgba(99, 102, 241, 0.15);
            border-radius: 4px;
            padding: 2px 6px;
        }
        
        .best-badge {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .scroll-indicator {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            z-index: 100;
            transition: width 0.1s ease;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
    </style>
</head>

            document.getElementById('favCount').textContent = favorites.length;
        }

        function updateLastUpdate() {
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
        }

        // ============================================
        // View Mode Functions
        // ============================================
        
        function setViewMode(mode) {
            currentView = mode;
            
            // Update buttons
            document.getElementById('btnCompare').classList.toggle('active', mode === 'compare');
            document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
            
            // Show/hide sections
            document.getElementById('selectionSection').classList.toggle('hidden', mode !== 'compare');
            document.getElementById('compareBar').classList.toggle('hidden', mode !== 'compare' || selectedTools.length === 0);
            document.getElementById('comparisonSection').classList.add('hidden');
            document.getElementById('gridSection').classList.toggle('hidden', mode !== 'grid');
            
            if (mode === 'grid') {
                renderGridView();
            } else {
                renderSelectionGrid();
            }
        }

        // ============================================
        // Selection Grid (Compare Mode)
        // ============================================
        
        function renderSelectionGrid() {
            const grid = document.getElementById('toolsGrid');
            
            let filtered = toolsData.filter(tool => {
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                const matchesSearch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    tool.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    tool.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesCategory && matchesSearch;
            });

            grid.innerHTML = filtered.map((tool, index) => {
                const isSelected = selectedTools.includes(tool.id);
                const isFav = favorites.includes(tool.id);
                
                return `
                    <label class="cursor-pointer group">
                        <input type="checkbox" class="compare-checkbox hidden" 
                               value="${tool.id}" 
                               ${isSelected ? 'checked' : ''}
                               onchange="toggleToolSelection('${tool.id}')">
                        <div class="card-hover glass rounded-xl p-4 border-2 border-transparent transition-all ${isSelected ? 'border-indigo-500 bg-indigo-500/10' : ''}">
                            <div class="flex items-start justify-between mb-3">
                                <div class="tool-icon bg-gradient-to-br ${tool.color} text-white text-xl">
                                    ${tool.icon}
                                </div>
                                <div class="flex gap-1">
                                    ${tool.isNew ? '<span class="new-badge text-xs px-2 py-0.5 rounded-full text-white font-bold">NEW</span>' : ''}
                                    <button onclick="event.preventDefault(); toggleFavorite('${tool.id}')" class="text-lg ${isFav ? 'text-red-400' : 'text-gray-600 hover:text-red-400'}">
                                        <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <h4 class="font-bold text-white mb-1">${tool.name}</h4>
                            <p class="text-xs text-gray-400 mb-2 line-clamp-2">${tool.description}</p>
                            
                            <div class="flex items-center justify-between">
                                <span class="text-xs ${getPriceClass(tool.price)} font-medium">${tool.priceText}</span>
                                <span class="rating-stars text-xs"><i class="fas fa-star"></i> ${tool.rating}</span>
                            </div>
                            
                            ${isSelected ? '<div class="mt-2 text-center text-xs text-indigo-400">✓ 已选择</div>' : ''}
                        </div>
                    </label>
                `;
            }).join('');
        }

        function toggleToolSelection(toolId) {
            const index = selectedTools.indexOf(toolId);
            if (index > -1) {
                selectedTools.splice(index, 1);
            } else {
                if (selectedTools.length >= 4) {
                    alert('最多只能选择 4 个工具进行对比');
                    return;
                }
                selectedTools.push(toolId);
            }
            updateCompareBar();
            renderSelectionGrid();
        }

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            const count = document.getElementById('selectedCount');
            const toolsContainer = document.getElementById('selectedTools');
            const btn = document.getElementById('btnShowCompare');
            
            if (selectedTools.length === 0) {
                bar.classList.add('hidden');
                return;
            }
            
            bar.classList.remove('hidden');
            count.textContent = selectedTools.length;
            
            toolsContainer.innerHTML = selectedTools.map(id => {
                const tool = toolsData.find(t => t.id === id);
                return `
                    <span class="glass px-3 py-1 rounded-full text-xs flex items-center gap-2">
                        ${tool.icon} ${tool.name}
                        <button onclick="toggleToolSelection('${id}')" class="text-gray-500 hover:text-red-400">×</button>
                    </span>
                `;
            }).join('');
            
            btn.disabled = selectedTools.length < 2;
            btn.textContent = selectedTools.length < 2 ? '至少选择 2 个' : '开始对比';
        }

        function clearSelection() {
            selectedTools = [];
            updateCompareBar();
            renderSelectionGrid();
        }

        // ============================================
        // Comparison Display
        // ============================================
        
        function showComparison() {
            if (selectedTools.length < 2) return;
            
            const tools = selectedTools.map(id => toolsData.find(t => t.id === id));
            
            document.getElementById('selectionSection').classList.add('hidden');
            document.getElementById('compareBar').classList.add('hidden');
            document.getElementById('comparisonSection').classList.remove('hidden');
            
            renderComparisonTable(tools);
            renderDetailedAnalysis(tools);
        }

        function backToSelection() {
            document.getElementById('comparisonSection').classList.add('hidden');
            document.getElementById('selectionSection').classList.remove('hidden');
            document.getElementById('compareBar').classList.remove('hidden');
        }

        function renderComparisonTable(tools) {
            const table = document.getElementById('comparisonTable');
            
            // Get all comparison keys
            const allKeys = [...new Set(tools.flatMap(t => Object.keys(t.comparisonPoints)))];
            
            // Find best values for highlighting
            const bestValues = {};
            allKeys.forEach(key => {
                const values = tools.map(t => t.comparisonPoints[key] || '-');
                // Simple heuristic: prefer certain keywords
                if (key.includes('价格') || key.includes('速度')) {
                    bestValues[key] = values.find(v => v.includes('免费') || v.includes('快'));
                } else if (key.includes('质量') || key.includes('能力')) {
                    bestValues[key] = values.find(v => v.includes('最高') || v.includes('最强') || v.includes('顶尖'));
                }
            });
            
            table.innerHTML = `
                <thead>
                    <tr>
                        <th class="text-left p-4 text-indigo-300">对比维度</th>
                        ${tools.map(tool => `
                            <th class="p-4 text-center min-w-[150px]">
                                <div class="flex flex-col items-center">
                                    <div class="tool-icon bg-gradient-to-br ${tool.color} text-white text-2xl mb-2">${tool.icon}</div>
                                    <div class="font-bold text-white">${tool.name}</div>
                                    <div class="text-xs text-gray-400 mt-1">${tool.priceText}</div>
                                </div>
                            </th>
                        `).join('')}
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="p-4 text-gray-400 font-medium">一句话评价</td>
                        ${tools.map(tool => `
                            <td class="p-4 text-center text-sm">${tool.description}</td>
                        `).join('')}
                    </tr>
                    ${allKeys.map(key => `
                        <tr>
                            <td class="p-4 text-gray-400 font-medium">${key}</td>
                            ${tools.map(tool => {
                                const value = tool.comparisonPoints[key] || '-';
                                const isBest = value === bestValues[key];
                                return `
                                    <td class="p-4 text-center ${isBest ? 'diff-highlight font-medium' : ''}">
                                        ${value}
                                        ${isBest ? '<span class="best-badge ml-1">推荐</span>' : ''}
                                    </td>
                                `;
                            }).join('')}
                        </tr>
                    `).join('')}
                    <tr>
                        <td class="p-4 text-gray-400 font-medium">评分</td>
                        ${tools.map(tool => `
                            <td class="p-4 text-center">
                                <span class="rating-stars"><i class="fas fa-star"></i> ${tool.rating}</span>
                            </td>
                        `).join('')}
                    </tr>
                    <tr>
                        <td class="p-4 text-gray-400 font-medium">操作</td>
                        ${tools.map(tool => `
                            <td class="p-4 text-center">
                                <a href="${tool.url}" target="_blank" 
                                   class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm transition-colors">
                                    访问官网 <i class="fas fa-external-link-alt text-xs"></i>
                                </a>
                            </td>
                        `).join('')}
                    </tr>
                </tbody>
            `;
        }

        function renderDetailedAnalysis(tools) {
            const container = document.getElementById('detailedAnalysis');
            
            container.innerHTML = tools.map(tool => `
                <div class="glass rounded-2xl p-6 fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="tool-icon bg-gradient-to-br ${tool.color} text-white">${tool.icon}</div>
                        <div>
                            <h4 class="font-bold text-lg text-white">${tool.name}</h4>
                            <div class="flex gap-2 mt-1">
                                ${tool.tags.map(tag => `<span class="tag text-xs px-2 py-0.5 rounded-full">${tag}</span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="pros-cons space-y-4">
                        <div class="pros pl-3">
                            <h5 class="text-green-400 font-semibold text-sm mb-2"><i class="fas fa-check-circle mr-2"></i>优势</h5>
                            <ul class="space-y-1">
                                ${tool.strengths.map(s => `<li class="text-sm text-gray-300">${s}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="cons pl-3">
                            <h5 class="text-red-400 font-semibold text-sm mb-2"><i class="fas fa-times-circle mr-2"></i>劣势</h5>
                            <ul class="space-y-1">
                                ${tool.weaknesses.map(w => `<li class="text-sm text-gray-300">${w}</li>`).join('')}
                            </ul>
                        </div>
                        
                        <div class="pt-4 border-t border-white/10">
                            <h5 class="text-indigo-400 font-semibold text-sm mb-2"><i class="fas fa-user-check mr-2"></i>最适合</h5>
                            <p class="text-sm text-gray-300">${tool.bestFor.join('、')}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ============================================
        // Grid View (Traditional)
        // ============================================
        
        function renderGridView() {
            const grid = document.getElementById('gridView');
            const sort = document.getElementById('sortSelect').value;
            
            let filtered = toolsData.filter(tool => {
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                const matchesSearch = tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    tool.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    tool.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesCategory && matchesSearch;
            });
            
            // Sort
            filtered.sort((a, b) => {
                if (sort === 'newest') return new Date(b.addedDate) - new Date(a.addedDate);
                if (sort === 'rating') return b.rating - a.rating;
                if (sort === 'name') return a.name.localeCompare(b.name);
                return (b.isNew ? 100 : 0) + b.rating - (a.isNew ? 100 : 0) - a.rating;
            });
            
            grid.innerHTML = filtered.map(tool => {
                const isFav = favorites.includes(tool.id);
                return `
                    <div class="card-hover glass rounded-2xl p-5 border border-white/10">
                        <div class="flex items-start justify-between mb-4">
                            <div class="tool-icon bg-gradient-to-br ${tool.color} text-white">${tool.icon}</div>
                            <div class="flex gap-2">
                                ${tool.isNew ? '<span class="new-badge text-xs px-2 py-1 rounded-full text-white font-medium">NEW</span>' : ''}
                                <button onclick="toggleFavorite('${tool.id}')" class="text-lg ${isFav ? 'text-red-400' : 'text-gray-600 hover:text-red-400'}">
                                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                            </div>
                        </div>
                        
                        <h3 class="text-lg font-bold text-white mb-2">${tool.name}</h3>
                        <p class="text-gray-400 text-sm mb-4">${tool.description}</p>
                        
                        <div class="flex flex-wrap gap-1.5 mb-4">
                            ${tool.tags.map(tag => `<span class="tag text-xs px-2 py-1 rounded-full">${tag}</span>`).join('')}
                        </div>
                        
                        <div class="flex items-center justify-between pt-4 border-t border-white/10">
                            <div class="flex items-center gap-2">
                                <span class="rating-stars text-sm"><i class="fas fa-star"></i> ${tool.rating}</span>
                                <span class="${getPriceClass(tool.price)} text-xs font-medium">${tool.priceText}</span>
                            </div>
                            <a href="${tool.url}" target="_blank" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-sm font-medium transition-colors">
                                访问 <i class="fas fa-external-link-alt text-xs"></i>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // Favorites
        // ============================================
        
        function toggleFavorite(toolId) {
            const index = favorites.indexOf(toolId);
            if (index > -1) {
                favorites.splice(index, 1);
            } else {
                favorites.push(toolId);
            }
            localStorage.setItem('aiToolsFavorites', JSON.stringify(favorites));
            updateFavCount();
            
            if (currentView === 'compare') {
                renderSelectionGrid();
            } else {
                renderGridView();
            }
        }

        function toggleFavoritesView() {
            // Filter to show only favorites
            const favTools = toolsData.filter(t => favorites.includes(t.id));
            if (favTools.length === 0) {
                alert('还没有收藏任何工具');
                return;
            }
            
            // Set search to show favorites
            alert(`你已收藏 ${favorites.length} 个工具：\n${favTools.map(t => `• ${t.name}`).join('\n')}`);
        }

        // ============================================
        // Event Listeners
        // ============================================
        
        document.addEventListener('DOMContentLoaded', () => {
            // Category filters
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    
                    if (currentView === 'compare') {
                        renderSelectionGrid();
                    } else {
                        renderGridView();
                    }
                });
            });
            
            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                if (currentView === 'compare') {
                    renderSelectionGrid();
                } else {
                    renderGridView();
                }
            });
            
            // Sort
            document.getElementById('sortSelect').addEventListener('change', () => {
                renderGridView();
            });
            
            // Scroll indicator
            window.addEventListener('scroll', () => {
                const scrollTop = document.documentElement.scrollTop;
                const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (scrollTop / scrollHeight) * 100;
                document.getElementById('scrollIndicator').style.width = scrolled + '%';
            });
            
            // Initialize
            updateFavCount();
            updateLastUpdate();
            renderSelectionGrid();
        });
    </script>
</body>
</html>
